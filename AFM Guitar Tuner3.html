<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Tuner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .tuner {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .strings {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .string-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: transparent;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .string-btn:hover {
      border-color: #4ecdc4;
      background: rgba(78, 205, 196, 0.1);
    }

    .string-btn.active {
      border-color: #4ecdc4;
      background: rgba(78, 205, 196, 0.2);
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
    }

    .display {
      margin-bottom: 30px;
    }

    .note {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
    }

    .frequency {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .meter {
      position: relative;
      height: 60px;
      margin-bottom: 30px;
    }

    .meter-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .meter-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 40px;
      background: #ff6b6b;
      border-radius: 2px;
      transition: left 0.1s ease-out;
    }

    .meter-indicator.in-tune {
      background: #4ecdc4;
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
    }

    .meter-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 50px;
      background: rgba(255, 255, 255, 0.5);
    }

    .meter-labels {
      display: flex;
      justify-content: space-between;
      padding: 0 10%;
      margin-top: 10px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .cents {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .cents.sharp { color: #ff6b6b; }
    .cents.flat { color: #feca57; }
    .cents.in-tune { color: #4ecdc4; }

    .start-btn {
      background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
      border: none;
      color: #fff;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(78, 205, 196, 0.4);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="tuner">
    <h1>🎸 Guitar Tuner</h1>
    
    <div class="strings">
      <button class="string-btn" data-note="E2">E</button>
      <button class="string-btn" data-note="A2">A</button>
      <button class="string-btn" data-note="D3">D</button>
      <button class="string-btn" data-note="G3">G</button>
      <button class="string-btn" data-note="B3">B</button>
      <button class="string-btn" data-note="E4">e</button>
    </div>

    <div class="display">
      <div class="note" id="note">--</div>
      <div class="frequency" id="frequency">-- Hz</div>
    </div>

    <div class="meter">
      <div class="meter-bar"></div>
      <div class="meter-center"></div>
      <div class="meter-indicator" id="indicator"></div>
      <div class="meter-labels">
        <span>♭ Flat</span>
        <span>Sharp ♯</span>
      </div>
    </div>

    <div class="cents" id="cents">--</div>

    <button class="start-btn" id="startBtn">Start Tuning</button>
    <div class="status" id="status">American Federation of Musicians (AFM.org)</div>
  </div>
   <script>
    // Standard tuning frequencies
    const NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const A4 = 440;

    // Guitar string reference frequencies (standard tuning)
    const GUITAR_STRINGS = {
      'E2': 82.41,
      'A2': 110.00,
      'D3': 146.83,
      'G3': 196.00,
      'B3': 246.94,
      'E4': 329.63
    };

    let audioContext;
    let analyser;
    let microphone;
    let isRunning = false;
    let animationId;

    const startBtn = document.getElementById('startBtn');
    const noteDisplay = document.getElementById('note');
    const frequencyDisplay = document.getElementById('frequency');
    const indicator = document.getElementById('indicator');
    const centsDisplay = document.getElementById('cents');
    const status = document.getElementById('status');
    const stringBtns = document.querySelectorAll('.string-btn');

    // Convert frequency to note number (MIDI-style)
    function frequencyToNoteNumber(freq) {
      return 12 * Math.log2(freq / A4) + 69;
    }

    // Convert note number to frequency
    function noteNumberToFrequency(noteNum) {
      return A4 * Math.pow(2, (noteNum - 69) / 12);
    }

    // Get note name from frequency
    function getNoteFromFrequency(freq) {
      const noteNum = frequencyToNoteNumber(freq);
      const roundedNote = Math.round(noteNum);
      const cents = Math.round((noteNum - roundedNote) * 100);
      const noteIndex = ((roundedNote % 12) + 12) % 12;
      const octave = Math.floor(roundedNote / 12) - 1;
      
      return {
        note: NOTES[noteIndex],
        octave: octave,
        cents: cents,
        frequency: freq
      };
    }

    // Autocorrelation pitch detection
    function autoCorrelate(buffer, sampleRate) {
      const SIZE = buffer.length;
      const MAX_SAMPLES = Math.floor(SIZE / 2);
      let bestOffset = -1;
      let bestCorrelation = 0;
      let rms = 0;
      let foundGoodCorrelation = false;
      const correlations = new Array(MAX_SAMPLES);

      // Calculate RMS
      for (let i = 0; i < SIZE; i++) {
        const val = buffer[i];
        rms += val * val;
      }
      rms = Math.sqrt(rms / SIZE);

      // Not enough signal
      if (rms < 0.01) return -1;

      let lastCorrelation = 1;
      for (let offset = 0; offset < MAX_SAMPLES; offset++) {
        let correlation = 0;

        for (let i = 0; i < MAX_SAMPLES; i++) {
          correlation += Math.abs(buffer[i] - buffer[i + offset]);
        }
        
        correlation = 1 - correlation / MAX_SAMPLES;
        correlations[offset] = correlation;

        if (correlation > 0.9 && correlation > lastCorrelation) {
          foundGoodCorrelation = true;
          if (correlation > bestCorrelation) {
            bestCorrelation = correlation;
            bestOffset = offset;
          }
        } else if (foundGoodCorrelation) {
          const shift = (correlations[bestOffset + 1] - correlations[bestOffset - 1]) / correlations[bestOffset];
          return sampleRate / (bestOffset + 8 * shift);
        }
        lastCorrelation = correlation;
      }

      if (bestCorrelation > 0.01) {
        return sampleRate / bestOffset;
      }
      return -1;
    }

    // Update the display
    function updateDisplay(noteInfo) {
      if (!noteInfo) {
        noteDisplay.textContent = '--';
        frequencyDisplay.textContent = '-- Hz';
        centsDisplay.textContent = '--';
        centsDisplay.className = 'cents';
        indicator.style.left = '50%';
        indicator.classList.remove('in-tune');
        return;
      }

      const { note, octave, cents, frequency } = noteInfo;
      
      noteDisplay.textContent = `${note}${octave}`;
      frequencyDisplay.textContent = `${frequency.toFixed(1)} Hz`;

      // Update cents display
      const centsAbs = Math.abs(cents);
      if (centsAbs <= 5) {
        centsDisplay.textContent = '✓ In Tune';
        centsDisplay.className = 'cents in-tune';
        indicator.classList.add('in-tune');
      } else {
        centsDisplay.textContent = cents > 0 ? `+${cents}¢` : `${cents}¢`;
        centsDisplay.className = `cents ${cents > 0 ? 'sharp' : 'flat'}`;
        indicator.classList.remove('in-tune');
      }

      // Update meter indicator (clamp to -50 to +50 cents range)
      const clampedCents = Math.max(-50, Math.min(50, cents));
      const position = 50 + (clampedCents / 50) * 40;
      indicator.style.left = `${position}%`;
    }

    // Main analysis loop
    function analyze() {
      const bufferLength = analyser.fftSize;
      const buffer = new Float32Array(bufferLength);
      analyser.getFloatTimeDomainData(buffer);

      const frequency = autoCorrelate(buffer, audioContext.sampleRate);

      if (frequency > 60 && frequency < 1000) {
        const noteInfo = getNoteFromFrequency(frequency);
        updateDisplay(noteInfo);
        
        // Highlight matching guitar string
        stringBtns.forEach(btn => {
          const stringNote = btn.dataset.note;
          const stringFreq = GUITAR_STRINGS[stringNote];
          const noteName = stringNote.slice(0, -1);
          const noteOctave = parseInt(stringNote.slice(-1));
          
          if (noteInfo.note === noteName && noteInfo.octave === noteOctave) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      } else {
        updateDisplay(null);
        stringBtns.forEach(btn => btn.classList.remove('active'));
      }

      if (isRunning) {
        animationId = requestAnimationFrame(analyze);
      }
    }

    // Start/stop tuning
    async function toggleTuning() {
      if (isRunning) {
        isRunning = false;
        cancelAnimationFrame(animationId);
        if (microphone) {
          microphone.disconnect();
          microphone.mediaStream.getTracks().forEach(track => track.stop());
        }
        startBtn.textContent = 'Start Tuning';
       <!-- status.textContent = 'American FederaAFM.org';
        updateDisplay(null);
        return;
      }

      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.mediaStream = stream;
        microphone.connect(analyser);

        isRunning = true;
        startBtn.textContent = 'Stop';
        status.textContent = 'Listening...';
        analyze();
      } catch (err) {
        status.textContent = 'Microphone access denied';
        console.error('Error accessing microphone:', err);
      }
    }

    // Play reference tone for a string
    function playReferenceNote(frequency) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.value = frequency;
      gainNode.gain.value = 0.3;

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
      oscillator.stop(ctx.currentTime + 1.5);
    }

    // Event listeners
    startBtn.addEventListener('click', toggleTuning);

    stringBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const note = btn.dataset.note;
        const freq = GUITAR_STRINGS[note];
        playReferenceNote(freq);
      });
    });
  </script>
</body>
</html>
